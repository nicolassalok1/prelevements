<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prélèvements GPS — ANRAC</title>
<meta name="description" content="Outil ANRAC — définir les champs d'une exploitation et générer automatiquement les points de prélèvement GPS.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📍</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d1117;--panel:#161b22;--border:#30363d;
  --olive:#6a7c3e;--olive-lit:#8fa84f;--amber:#e6a817;--red:#cf4a4a;
  --text:#cdd9e5;--muted:#768390;
  --mono:'Share Tech Mono',monospace;--ui:'Barlow Condensed',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--ui);height:100vh;display:grid;grid-template-rows:52px 1fr;grid-template-columns:340px 1fr;overflow:hidden;}

/* HEADER */
header{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:18px;padding:0 20px;}
.logo{font-family:var(--mono);font-size:11px;color:var(--olive-lit);letter-spacing:2px;border:1px solid var(--olive);padding:3px 8px;}
header h1{font-size:15px;font-weight:600;letter-spacing:3px;text-transform:uppercase;}
.header-status{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--olive-lit);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SIDEBAR */
aside{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.section{padding:14px 16px;border-bottom:1px solid var(--border);}
.section-title{font-family:var(--mono);font-size:10px;color:var(--olive-lit);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.section-title::before{content:'';width:12px;height:1px;background:var(--olive-lit);}

.btn{font-family:var(--ui);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:7px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--olive);color:var(--olive-lit);}
.btn.active{background:var(--olive);border-color:var(--olive);color:#fff;}
.btn.danger{border-color:var(--red);color:var(--red);}
.btn.danger:hover{background:var(--red);color:#fff;}
.btn.amber{border-color:var(--amber);color:var(--amber);}
.btn.amber:hover{background:var(--amber);color:#000;}
.btn-full{width:100%;margin-top:6px;}
.btn:disabled{opacity:.3;cursor:not-allowed;}

.mode-group{display:flex;gap:6px;}

/* FIELD NAME INPUT */
.field-name-row{display:flex;gap:6px;margin-bottom:8px;}
.field-input{flex:1;font-family:var(--mono);font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--olive-lit);}
.field-input::placeholder{color:var(--muted);}

/* SAMPLING CONFIG */
.config-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.config-row label{font-size:11px;color:var(--muted);min-width:70px;text-transform:uppercase;letter-spacing:.5px;}
.config-row select,.config-row input[type=number]{font-family:var(--mono);font-size:12px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;outline:none;flex:1;}
.config-row select:focus,.config-row input[type=number]:focus{border-color:var(--olive-lit);}
.config-row select option{background:var(--panel);color:var(--text);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.stat-box{background:var(--bg);border:1px solid var(--border);padding:6px 8px;}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.stat-value{font-family:var(--mono);font-size:18px;color:var(--olive-lit);margin-top:1px;}
.stat-unit{font-size:9px;color:var(--muted);}

/* FIELD LIST */
.field-list{flex:1;overflow-y:auto;padding:0;}
.field-list::-webkit-scrollbar{width:4px;}
.field-list::-webkit-scrollbar-track{background:var(--bg);}
.field-list::-webkit-scrollbar-thumb{background:var(--border);}

.field-card{border-bottom:1px solid var(--border);padding:10px 16px;cursor:pointer;transition:background .1s;}
.field-card:hover{background:rgba(106,124,62,.08);}
.field-card.selected{background:rgba(106,124,62,.15);border-left:3px solid var(--olive-lit);}
.field-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.field-color{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.field-name{font-family:var(--ui);font-size:13px;font-weight:600;color:var(--text);flex:1;}
.field-badge{font-family:var(--mono);font-size:9px;color:var(--amber);background:rgba(230,168,23,.1);border:1px solid rgba(230,168,23,.25);padding:1px 6px;}
.field-meta{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.6;}
.field-actions{display:flex;gap:4px;margin-top:6px;}
.field-actions .btn{padding:4px 8px;font-size:10px;flex:0;}

.point-sub{font-family:var(--mono);font-size:10px;color:var(--muted);padding:4px 16px 4px 34px;border-bottom:1px solid rgba(48,54,61,.5);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:6px;}
.point-sub:hover{background:rgba(230,168,23,.06);}
.point-sub .pt-label{color:var(--amber);min-width:36px;}
.point-sub .pt-coords{flex:1;}
.point-sub .pt-del{color:var(--border);background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;transition:color .1s;}
.point-sub .pt-del:hover{color:var(--red);}

.empty-state{padding:24px 16px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7;}

/* EXPORT */
.export-group{display:flex;gap:6px;}

/* MAP */
#map{width:100%;height:100%;background:#0d1117;}
#map.draw-mode{cursor:crosshair !important;}

/* LEAFLET OVERRIDES */
.leaflet-control-zoom a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--border)!important;}
.leaflet-bar{border-color:var(--border)!important;}
.leaflet-popup-content-wrapper{background:var(--panel);border:1px solid var(--olive);border-radius:0;color:var(--text);font-family:var(--mono);font-size:11px;}
.leaflet-popup-tip{background:var(--panel);}
.leaflet-popup-close-button{color:var(--muted)!important;}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--olive);padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--olive-lit);z-index:9999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.error{border-color:var(--red);color:var(--red);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);padding:24px;min-width:320px;max-width:90vw;}
.modal h3{font-family:var(--mono);font-size:12px;color:var(--olive-lit);letter-spacing:2px;margin-bottom:16px;}
.modal .config-row{margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.modal-btns .btn{flex:1;}

/* RESPONSIVE */
@media(max-width:768px){
  body{grid-template-columns:1fr;grid-template-rows:52px auto 1fr;}
  aside{border-right:none;border-bottom:1px solid var(--border);max-height:45vh;overflow-y:auto;}
}
</style>
</head>
<body>

<header>
  <div class="logo">ANRAC</div>
  <h1>Gestion Parcelles & Prélèvements</h1>
  <div class="header-status">
    <div class="dot"></div>
    <span id="status-text">EN ATTENTE</span>
  </div>
</header>

<aside>
  <!-- ADD FIELD -->
  <div class="section">
    <div class="section-title">Nouveau champ</div>
    <div class="field-name-row">
      <input type="text" class="field-input" id="field-name" placeholder="Nom du champ (ex: Blé Nord)">
    </div>
    <button class="btn active btn-full" id="btn-draw" onclick="startDrawField()">▭ Dessiner sur la carte</button>
  </div>

  <!-- SAMPLING CONFIG -->
  <div class="section">
    <div class="section-title">Génération points</div>
    <div class="config-row">
      <label>Méthode</label>
      <select id="cfg-method">
        <option value="grid">Grille régulière</option>
        <option value="zigzag">Zigzag (W)</option>
        <option value="random">Aléatoire stratifié</option>
      </select>
    </div>
    <div class="config-row">
      <label>Densité</label>
      <input type="number" id="cfg-density" value="1" min="0.5" max="20" step="0.5">
      <span style="font-size:10px;color:var(--muted)">pts/ha</span>
    </div>
    <button class="btn amber btn-full" onclick="generatePointsForSelected()">⊕ Générer les points</button>
  </div>

  <!-- STATS -->
  <div class="section">
    <div class="section-title">Exploitation</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Champs</div>
        <div class="stat-value" id="stat-fields">0</div>
        <div class="stat-unit">parcelles</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Surface</div>
        <div class="stat-value" id="stat-area">0</div>
        <div class="stat-unit">ha total</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Points</div>
        <div class="stat-value" id="stat-pts">0</div>
        <div class="stat-unit">prélèvements</div>
      </div>
    </div>
  </div>

  <!-- EXPORT -->
  <div class="section">
    <div class="section-title">Export</div>
    <div class="export-group">
      <button class="btn amber" onclick="exportCSV()">↓ CSV</button>
      <button class="btn amber" onclick="exportGeoJSON()">↓ GeoJSON</button>
      <button class="btn amber" onclick="exportKML()">↓ KML</button>
    </div>
  </div>

  <!-- FIELD LIST -->
  <div class="section" style="padding-bottom:6px;">
    <div class="section-title">Champs de l'exploitation</div>
    <button class="btn danger" style="font-size:10px;padding:4px 8px;" onclick="clearAll()">✕ Tout effacer</button>
  </div>
  <div class="field-list" id="field-list">
    <div class="empty-state">Saisissez un nom et dessinez<br>vos champs sur la carte.<br>Les points seront générés<br>automatiquement.</div>
  </div>
</aside>

<div id="map"></div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const FIELD_COLORS = ['#8fa84f','#e6a817','#4fa8a0','#a84f6a','#4f6aa8','#a8854f','#8a4fa8','#4fa85e','#cf4a4a','#4a8fcf'];
let fields = [];       // { id, name, color, latlngs[], layer, area, perim, points[], pointMarkers[] }
let fieldIdCounter = 0;
let selectedFieldId = null;
let drawHandler = null;
let isDrawing = false;

// ═══════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════
const map = L.map('map', { center: [34.9615, -4.6181], zoom: 14, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© CartoDB', maxZoom: 20
}).addTo(map);

const drawnItems = new L.FeatureGroup().addTo(map);
const drawControl = new L.Control.Draw({
  edit: { featureGroup: drawnItems, edit: false, remove: false },
  draw: { polygon: { shapeOptions: { color: '#8fa84f', weight: 2, fillOpacity: 0.15 } },
    rectangle: false, circle: false, marker: false, polyline: false, circlemarker: false }
});
map.addControl(drawControl);
// Hide native toolbar
setTimeout(() => { const tb = document.querySelector('.leaflet-draw'); if (tb) tb.style.display = 'none'; }, 100);

// ═══════════════════════════════════════════
//  DRAW FIELD
// ═══════════════════════════════════════════
function startDrawField() {
  if (isDrawing) { stopDraw(); return; }
  const name = document.getElementById('field-name').value.trim();
  if (!name) { toast('⚠ Saisissez un nom pour le champ', true); document.getElementById('field-name').focus(); return; }
  isDrawing = true;
  document.getElementById('btn-draw').textContent = '■ Annuler le dessin';
  document.getElementById('btn-draw').classList.add('danger');
  document.getElementById('btn-draw').classList.remove('active');
  document.getElementById('map').classList.add('draw-mode');
  setStatus('DESSIN — cliquez les sommets du champ');

  const color = FIELD_COLORS[fieldIdCounter % FIELD_COLORS.length];
  drawHandler = new L.Draw.Polygon(map, {
    shapeOptions: { color: color, weight: 2, fillColor: color, fillOpacity: 0.12 }
  });
  drawHandler.enable();
}

function stopDraw() {
  if (drawHandler) { try { drawHandler.disable(); } catch(e){} drawHandler = null; }
  isDrawing = false;
  document.getElementById('btn-draw').textContent = '▭ Dessiner sur la carte';
  document.getElementById('btn-draw').classList.remove('danger');
  document.getElementById('btn-draw').classList.add('active');
  document.getElementById('map').classList.remove('draw-mode');
  setStatus('EN ATTENTE');
}

map.on(L.Draw.Event.CREATED, function(e) {
  const name = document.getElementById('field-name').value.trim() || ('Champ ' + (fieldIdCounter + 1));
  const color = FIELD_COLORS[fieldIdCounter % FIELD_COLORS.length];
  const layer = e.layer;
  layer.setStyle({ color: color, fillColor: color, weight: 2, fillOpacity: 0.12 });
  drawnItems.addLayer(layer);

  const latlngs = layer.getLatLngs()[0];
  const area = calcArea(latlngs) / 10000;
  const perim = calcPerimeter(latlngs);

  const field = {
    id: ++fieldIdCounter,
    name: name,
    color: color,
    latlngs: latlngs,
    layer: layer,
    area: area,
    perim: perim,
    points: [],
    pointMarkers: []
  };

  // Label on polygon
  const center = layer.getBounds().getCenter();
  field.labelMarker = L.marker(center, {
    icon: L.divIcon({
      html: `<div style="font-family:var(--ui);font-size:12px;font-weight:700;color:${color};text-shadow:0 0 4px #000,0 0 8px #000;white-space:nowrap;">${name}</div>`,
      iconSize: [0,0], className: ''
    })
  }).addTo(map);

  fields.push(field);
  selectedFieldId = field.id;

  document.getElementById('field-name').value = '';
  stopDraw();
  updateStats();
  renderFieldList();
  toast(`✓ "${name}" ajouté — ${area.toFixed(2)} ha`);
  setStatus(`CHAMP "${name.toUpperCase()}" SÉLECTIONNÉ`);
});

// ═══════════════════════════════════════════
//  POINT GENERATION
// ═══════════════════════════════════════════
function generatePointsForSelected() {
  const field = fields.find(f => f.id === selectedFieldId);
  if (!field) { toast('⚠ Sélectionnez un champ d\'abord', true); return; }

  // Clear existing points for this field
  field.pointMarkers.forEach(m => map.removeLayer(m));
  field.pointMarkers = [];
  field.points = [];

  const method = document.getElementById('cfg-method').value;
  const density = parseFloat(document.getElementById('cfg-density').value) || 1;
  const targetCount = Math.max(1, Math.round(field.area * density));

  let generated = [];
  if (method === 'grid') {
    generated = generateGrid(field.latlngs, targetCount);
  } else if (method === 'zigzag') {
    generated = generateZigzag(field.latlngs, targetCount);
  } else {
    generated = generateRandom(field.latlngs, targetCount);
  }

  generated.forEach((ll, i) => {
    const label = field.name.substring(0, 3).toUpperCase() + '-' + String(i + 1).padStart(2, '0');
    const pt = { label, lat: ll.lat, lng: ll.lng };
    field.points.push(pt);

    const icon = L.divIcon({
      html: `<div style="
        background:${field.color};color:#000;
        font-family:'Share Tech Mono',monospace;font-size:8px;font-weight:700;
        width:24px;height:24px;display:flex;align-items:center;justify-content:center;
        border:2px solid #0d1117;border-radius:50%;box-shadow:0 0 0 1px ${field.color};
      ">${i+1}</div>`,
      iconSize: [24,24], iconAnchor: [12,12]
    });

    const marker = L.marker([ll.lat, ll.lng], { icon })
      .addTo(map)
      .bindPopup(`<b>${label}</b><br>${field.name}<br>Lat: ${ll.lat.toFixed(6)}<br>Lng: ${ll.lng.toFixed(6)}`);
    field.pointMarkers.push(marker);
  });

  updateStats();
  renderFieldList();
  toast(`✓ ${generated.length} points générés pour "${field.name}"`);
}

// ── Grid generation
function generateGrid(polygon, count) {
  const bounds = L.polygon(polygon).getBounds();
  const cols = Math.max(1, Math.round(Math.sqrt(count * (bounds.getEast() - bounds.getWest()) / (bounds.getNorth() - bounds.getSouth()))));
  const rows = Math.max(1, Math.round(count / cols));
  const stepLat = (bounds.getNorth() - bounds.getSouth()) / (rows + 1);
  const stepLng = (bounds.getEast() - bounds.getWest()) / (cols + 1);
  const pts = [];
  for (let r = 1; r <= rows; r++) {
    for (let c = 1; c <= cols; c++) {
      const lat = bounds.getSouth() + stepLat * r;
      const lng = bounds.getWest() + stepLng * c;
      if (isInsidePolygon({ lat, lng }, polygon)) pts.push({ lat, lng });
    }
  }
  // If we got fewer than needed, add extras
  if (pts.length === 0) {
    const center = L.polygon(polygon).getBounds().getCenter();
    pts.push({ lat: center.lat, lng: center.lng });
  }
  return pts;
}

// ── Zigzag (W) generation
function generateZigzag(polygon, count) {
  const bounds = L.polygon(polygon).getBounds();
  const rows = Math.max(2, Math.round(Math.sqrt(count)));
  const stepLat = (bounds.getNorth() - bounds.getSouth()) / (rows + 1);
  const pts = [];
  for (let r = 1; r <= rows && pts.length < count; r++) {
    const lat = bounds.getSouth() + stepLat * r;
    // Find the min/max lng inside polygon at this latitude
    const intersections = [];
    for (let lng = bounds.getWest(); lng <= bounds.getEast(); lng += (bounds.getEast() - bounds.getWest()) / 200) {
      if (isInsidePolygon({ lat, lng }, polygon)) intersections.push(lng);
    }
    if (intersections.length === 0) continue;
    const minLng = Math.min(...intersections);
    const maxLng = Math.max(...intersections);

    const ptsPerRow = Math.max(1, Math.ceil(count / rows));
    for (let c = 0; c < ptsPerRow && pts.length < count; c++) {
      let lng;
      if (r % 2 === 1) {
        lng = minLng + (maxLng - minLng) * c / Math.max(1, ptsPerRow - 1);
      } else {
        lng = maxLng - (maxLng - minLng) * c / Math.max(1, ptsPerRow - 1);
      }
      if (isInsidePolygon({ lat, lng }, polygon)) pts.push({ lat, lng });
    }
  }
  if (pts.length === 0) {
    const center = L.polygon(polygon).getBounds().getCenter();
    pts.push({ lat: center.lat, lng: center.lng });
  }
  return pts;
}

// ── Random stratified generation
function generateRandom(polygon, count) {
  const bounds = L.polygon(polygon).getBounds();
  const pts = [];
  let attempts = 0;
  while (pts.length < count && attempts < count * 100) {
    attempts++;
    const lat = bounds.getSouth() + Math.random() * (bounds.getNorth() - bounds.getSouth());
    const lng = bounds.getWest() + Math.random() * (bounds.getEast() - bounds.getWest());
    if (isInsidePolygon({ lat, lng }, polygon)) {
      // Minimum distance check to avoid clustering
      const minDist = Math.sqrt(calcAreaFromBounds(bounds) / count) * 0.3;
      const tooClose = pts.some(p => {
        const dlat = (p.lat - lat) * 111320;
        const dlng = (p.lng - lng) * 111320 * Math.cos(lat * Math.PI / 180);
        return Math.sqrt(dlat*dlat + dlng*dlng) < minDist;
      });
      if (!tooClose) pts.push({ lat, lng });
    }
  }
  if (pts.length === 0) {
    const center = L.polygon(polygon).getBounds().getCenter();
    pts.push({ lat: center.lat, lng: center.lng });
  }
  return pts;
}

function calcAreaFromBounds(b) {
  const h = (b.getNorth() - b.getSouth()) * 111320;
  const w = (b.getEast() - b.getWest()) * 111320 * Math.cos((b.getSouth() + b.getNorth()) / 2 * Math.PI / 180);
  return h * w;
}

// ═══════════════════════════════════════════
//  GEOMETRY HELPERS
// ═══════════════════════════════════════════
function isInsidePolygon(point, polygon) {
  let inside = false;
  const x = point.lng, y = point.lat;
  for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
    const xi = polygon[i].lng, yi = polygon[i].lat;
    const xj = polygon[j].lng, yj = polygon[j].lat;
    if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}

function calcArea(latlngs) {
  let area = 0;
  const n = latlngs.length;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const lat1 = latlngs[i].lat * Math.PI / 180, lat2 = latlngs[j].lat * Math.PI / 180;
    const lng1 = latlngs[i].lng * Math.PI / 180, lng2 = latlngs[j].lng * Math.PI / 180;
    area += (lng2 - lng1) * (2 + Math.sin(lat1) + Math.sin(lat2));
  }
  return Math.abs(area * 6378137 * 6378137 / 2);
}

function calcPerimeter(latlngs) {
  let total = 0;
  for (let i = 0; i < latlngs.length; i++) {
    total += latlngs[i].distanceTo(latlngs[(i + 1) % latlngs.length]);
  }
  return total;
}

// ═══════════════════════════════════════════
//  UI UPDATES
// ═══════════════════════════════════════════
function updateStats() {
  document.getElementById('stat-fields').textContent = fields.length;
  document.getElementById('stat-area').textContent = fields.reduce((s, f) => s + f.area, 0).toFixed(2);
  document.getElementById('stat-pts').textContent = fields.reduce((s, f) => s + f.points.length, 0);
}

function selectField(id) {
  selectedFieldId = id;
  const field = fields.find(f => f.id === id);
  if (field) {
    map.fitBounds(field.layer.getBounds(), { padding: [40, 40] });
    setStatus(`CHAMP "${field.name.toUpperCase()}" SÉLECTIONNÉ`);
  }
  renderFieldList();
}

function deleteField(id) {
  const fi = fields.findIndex(f => f.id === id);
  if (fi === -1) return;
  const field = fields[fi];
  field.pointMarkers.forEach(m => map.removeLayer(m));
  drawnItems.removeLayer(field.layer);
  if (field.labelMarker) map.removeLayer(field.labelMarker);
  fields.splice(fi, 1);
  if (selectedFieldId === id) selectedFieldId = fields.length ? fields[0].id : null;
  updateStats();
  renderFieldList();
  toast(`Champ "${field.name}" supprimé`);
}

function deletePointFromField(fieldId, ptIndex) {
  const field = fields.find(f => f.id === fieldId);
  if (!field) return;
  map.removeLayer(field.pointMarkers[ptIndex]);
  field.pointMarkers.splice(ptIndex, 1);
  field.points.splice(ptIndex, 1);
  // Re-label remaining points
  field.points.forEach((pt, i) => {
    pt.label = field.name.substring(0, 3).toUpperCase() + '-' + String(i + 1).padStart(2, '0');
  });
  field.pointMarkers.forEach((m, i) => {
    const pt = field.points[i];
    m.setPopupContent(`<b>${pt.label}</b><br>${field.name}<br>Lat: ${pt.lat.toFixed(6)}<br>Lng: ${pt.lng.toFixed(6)}`);
    m.setIcon(L.divIcon({
      html: `<div style="
        background:${field.color};color:#000;
        font-family:'Share Tech Mono',monospace;font-size:8px;font-weight:700;
        width:24px;height:24px;display:flex;align-items:center;justify-content:center;
        border:2px solid #0d1117;border-radius:50%;box-shadow:0 0 0 1px ${field.color};
      ">${i+1}</div>`,
      iconSize: [24,24], iconAnchor: [12,12]
    }));
  });
  updateStats();
  renderFieldList();
}

function focusPoint(fieldId, ptIndex) {
  const field = fields.find(f => f.id === fieldId);
  if (!field || !field.points[ptIndex]) return;
  const pt = field.points[ptIndex];
  map.setView([pt.lat, pt.lng], 17);
  field.pointMarkers[ptIndex].openPopup();
}

function renderFieldList() {
  const el = document.getElementById('field-list');
  if (fields.length === 0) {
    el.innerHTML = '<div class="empty-state">Saisissez un nom et dessinez<br>vos champs sur la carte.<br>Les points seront générés<br>automatiquement.</div>';
    return;
  }
  let html = '';
  fields.forEach(f => {
    const sel = f.id === selectedFieldId ? 'selected' : '';
    html += `<div class="field-card ${sel}" onclick="selectField(${f.id})">
      <div class="field-header">
        <div class="field-color" style="background:${f.color}"></div>
        <span class="field-name">${f.name}</span>
        <span class="field-badge">${f.points.length} pts</span>
      </div>
      <div class="field-meta">
        ${f.area.toFixed(2)} ha · ${Math.round(f.perim)} m périm.
      </div>
      <div class="field-actions">
        <button class="btn amber" onclick="event.stopPropagation();selectedFieldId=${f.id};generatePointsForSelected()">⊕ Régénérer</button>
        <button class="btn danger" onclick="event.stopPropagation();deleteField(${f.id})">✕</button>
      </div>
    </div>`;
    // Points sub-list
    f.points.forEach((pt, i) => {
      html += `<div class="point-sub" onclick="focusPoint(${f.id},${i})">
        <span class="pt-label">${pt.label}</span>
        <span class="pt-coords">${pt.lat.toFixed(6)}, ${pt.lng.toFixed(6)}</span>
        <button class="pt-del" onclick="event.stopPropagation();deletePointFromField(${f.id},${i})">✕</button>
      </div>`;
    });
  });
  el.innerHTML = html;
}

function clearAll() {
  fields.forEach(f => {
    f.pointMarkers.forEach(m => map.removeLayer(m));
    drawnItems.removeLayer(f.layer);
    if (f.labelMarker) map.removeLayer(f.labelMarker);
  });
  fields = [];
  fieldIdCounter = 0;
  selectedFieldId = null;
  updateStats();
  renderFieldList();
  setStatus('EN ATTENTE');
  toast('Carte réinitialisée');
}

// ═══════════════════════════════════════════
//  EXPORTS
// ═══════════════════════════════════════════
function getAllPoints() {
  const all = [];
  fields.forEach(f => {
    f.points.forEach(pt => {
      all.push({ field: f.name, label: pt.label, lat: pt.lat, lng: pt.lng });
    });
  });
  return all;
}

function exportCSV() {
  const pts = getAllPoints();
  if (!pts.length) { toast('⚠ Aucun point à exporter', true); return; }
  const rows = ['Champ,Label,Latitude,Longitude', ...pts.map(p => `${p.field},${p.label},${p.lat.toFixed(8)},${p.lng.toFixed(8)}`)];
  download('prelevements.csv', rows.join('\n'), 'text/csv');
  toast('✓ CSV exporté — ' + pts.length + ' points');
}

function exportGeoJSON() {
  const pts = getAllPoints();
  if (!pts.length) { toast('⚠ Aucun point à exporter', true); return; }
  const features = pts.map(p => ({
    type: 'Feature',
    properties: { field: p.field, label: p.label },
    geometry: { type: 'Point', coordinates: [p.lng, p.lat] }
  }));
  fields.forEach(f => {
    features.push({
      type: 'Feature',
      properties: { type: 'parcelle', name: f.name, area_ha: +f.area.toFixed(2) },
      geometry: { type: 'Polygon', coordinates: [f.latlngs.map(ll => [ll.lng, ll.lat]).concat([[f.latlngs[0].lng, f.latlngs[0].lat]])] }
    });
  });
  download('prelevements.geojson', JSON.stringify({ type: 'FeatureCollection', features }, null, 2), 'application/json');
  toast('✓ GeoJSON exporté');
}

function exportKML() {
  const pts = getAllPoints();
  if (!pts.length) { toast('⚠ Aucun point à exporter', true); return; }
  let placemarks = '';
  fields.forEach(f => {
    placemarks += `\n  <Folder><name>${f.name}</name>`;
    f.points.forEach(pt => {
      placemarks += `\n    <Placemark><name>${pt.label}</name><description>${f.name}</description><Point><coordinates>${pt.lng.toFixed(8)},${pt.lat.toFixed(8)},0</coordinates></Point></Placemark>`;
    });
    placemarks += `\n  </Folder>`;
  });
  const kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document><name>Prélèvements ANRAC</name>${placemarks}\n</Document>\n</kml>`;
  download('prelevements.kml', kml, 'application/vnd.google-earth.kml+xml');
  toast('✓ KML exporté');
}

function download(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
let toastTimer;
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('error', !!isError);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

function setStatus(t) {
  document.getElementById('status-text').textContent = t;
}
</script>
</body>
</html>
